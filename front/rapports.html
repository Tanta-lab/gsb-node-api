<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapports GSB</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #111;
        }

        header {
            background: #111;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            align-items: end;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }

        .error {
            color: #b00020;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, button {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            background: #111;
            color: white;
            border: none;
            cursor: pointer;
        }

        .muted {
            color: #666;
            font-size: 14px;
        }

        a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
<header>
    <div><strong>GSB</strong> — Mes rapports</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="medecins.html">Médecins</a>
        <button id="logoutBtn">Déconnexion</button>
    </div>
</header>

<div class="container">
    <div class="toolbar">
        <div>
            <label for="dateFilter">Filtrer par date</label>
            <input type="date" id="dateFilter">
        </div>

        <button id="filterReportsBtn">Filtrer</button>
        <button id="resetReportsBtn">Réinitialiser</button>
    </div>

    <p id="error" class="error"></p>
    <div id="reportsPageList"></div>
</div>

<script src="front.js"></script>
</body>
</html>
